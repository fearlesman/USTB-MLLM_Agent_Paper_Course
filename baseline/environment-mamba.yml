# Cross-platform baseline environment for AV-SpeakerBench.
# Create:   mamba env create -f baseline/environment-mamba.yml
# Activate: mamba activate av-speakerbench
#
# Notes:
# - This file intentionally matches baseline/environment.yml; keep them in sync.
# - It covers the baseline benchmark harness only.
# - If you need a CUDA-specific PyTorch build, replace torch/torchvision/torchaudio
#   after environment creation with the wheel/index that matches your machine.

name: av-speakerbench
channels:
  - conda-forge
dependencies:
  - python=3.11
  - ffmpeg
  - pip
  - pip:
      - certifi>=2024.0.0
      - datasets>=2.14.0
      - dashscope>=1.20.0
      - google-genai>=1.0.0
      - huggingface-hub>=0.20.0
      - imageio-ffmpeg>=0.4.0
      - matplotlib>=3.8.0
      - moviepy>=2.0
      - openai>=1.52.0
      - python-dotenv>=1.0.0
      - torch
      - torchaudio
      - torchvision
      - tqdm>=4.65.0
